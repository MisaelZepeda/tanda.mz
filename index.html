<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TandaBank Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f766e">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --bg: #eef2f3; --surface: #ffffff; --ink: #111827; --muted: #64748b; 
            --line: #dbe3ea; --primary: #0f766e; --primary-dark: #115e59; 
            --accent: #2563eb; --warning: #f59e0b; --danger: #dc2626; 
            --active-row: #f0fdf4; --active-border: #10b981;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.10); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { min-height: 100vh; background: #eef2f3; color: var(--ink); padding-bottom: 90px; }
        
        .header { padding: 20px; background: var(--primary); color: white; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .container { padding: 15px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
        
        /* Turno Activo */
        .turno-activo-badge { background: var(--active-border); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        tr.active-row { background-color: var(--active-row) !important; border-left: 4px solid var(--active-border); }

        /* Estilos de Dashboard */
        .account-card { background: linear-gradient(135deg, #0f766e, #1e3a8a); color: white; border: 0; }
        .balance-amount { font-size: 38px; font-weight: 800; }
        
        /* Tabla y Controles */
        .table-container { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid var(--line); font-size: 14px; }
        th { background: #f8fafc; color: var(--muted); }
        .checkbox-pago { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
        .btn-action { width: 34px; height: 34px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; border: none; cursor: pointer; color: white; }
        .btn-wa { background: #25D366; margin-right: 5px; }
        .btn-del { background: var(--danger); }
        
        /* DISEÑO DE MENÚ RECUPERADO (Estilo V4) */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.96); 
            display: flex; justify-content: center; gap: 8px; 
            padding: 10px 12px; 
            box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.10); 
            border-top: 1px solid var(--line); 
            z-index: 1000; 
            backdrop-filter: blur(12px); 
        }
        .nav-item { 
            background: transparent; border: none; color: var(--muted); 
            font-size: 12px; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; padding: 7px 18px; 
            width: min(31%, 150px); border-radius: 8px; 
            cursor: pointer; transition: 0.2s;
        }
        .nav-item.active { color: var(--primary); background: #e6fffb; font-weight: bold; }
        .nav-icon { font-size: 18px; line-height: 1; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 18px;">TandaBank Pro</h2>
        <p style="font-size: 12px; opacity: 0.8;">Gestión de Turnos y Cobranza</p>
    </div>

    <div class="container">
        
        <div id="tab-inicio" class="tab-content active">
            <div class="card account-card">
                <p style="font-size: 12px; opacity: 0.8;">TOTAL EN CAJA</p>
                <p class="balance-amount" id="displayRecaudado">$0.00</p>
                <div id="infoTurnoActivo" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2);"></div>
            </div>

            <div class="card">
                <h3>Resumen de Pagos</h3>
                <div style="height: 180px; margin-top: 15px;"><canvas id="graficaAvance"></canvas></div>
                <h4 style="margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--line); color: var(--muted); font-size: 13px; text-transform: uppercase;">Avance por Participante</h4>
                <div style="height: 250px; margin-top: 10px;"><canvas id="graficaParticipantes"></canvas></div>
            </div>
        </div>

        <div id="tab-participantes" class="tab-content">
            <div class="card">
                <h3>Agregar Participante</h3>
                <form onsubmit="agregarParticipante(event)" style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="nombre" placeholder="Nombre completo" required style="flex: 2; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                    <button type="submit" style="flex: 1; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor:pointer;">Añadir</button>
                </form>
            </div>

            <div class="card">
                <div class="table-container">
                    <table id="tablaTanda">
                        <thead id="tablaHead"></thead>
                        <tbody id="listaParticipantes"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-ajustes" class="tab-content">
            <div class="card">
                <h3>Configuración</h3>
                <div style="margin-top: 15px;">
                    <label style="display: block; font-size: 13px; margin-bottom: 5px;">Monto por Turno ($)</label>
                    <input type="number" id="montoAportacion" value="500" onchange="guardarDatos()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--line);">
                </div>
            </div>

            <div class="card">
                <h3>Herramientas y Respaldo</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button onclick="exportarCSV()" style="background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; cursor:pointer;">📊 Excel</button>
                    <button onclick="descargarRespaldo()" style="background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; cursor:pointer;">💾 Guardar JSON</button>
                </div>
                <button onclick="document.getElementById('inputCargar').click()" style="width: 100%; margin-top: 10px; background: var(--warning); color: white; border: none; padding: 12px; border-radius: 8px; cursor:pointer;">📂 Cargar Respaldo</button>
                <input type="file" id="inputCargar" accept=".json" style="display: none;" onchange="cargarRespaldo(event)">
                <button onclick="reiniciarTanda()" style="width: 100%; margin-top: 30px; background: var(--danger); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor:pointer;">🛑 REINICIAR TANDA</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="cambiarPestana('inicio', this)" type="button">
            <span class="nav-icon">📊</span>
            <span>Inicio</span>
        </button>
        <button class="nav-item" onclick="cambiarPestana('participantes', this)" type="button">
            <span class="nav-icon">👥</span>
            <span>Turnos</span>
        </button>
        <button class="nav-item" onclick="cambiarPestana('ajustes', this)" type="button">
            <span class="nav-icon">⚙️</span>
            <span>Ajustes</span>
        </button>
    </nav>

    <script>
        let participantes = JSON.parse(localStorage.getItem('tanda_participantes')) || [];
        let graficaTotal = null, graficaBarras = null;

        document.getElementById('montoAportacion').value = localStorage.getItem('tanda_monto') || 500;

        function cambiarPestana(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function agregarParticipante(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            participantes.push({ turno: participantes.length + 1, nombre, pagos: [] });
            document.getElementById('nombre').value = '';
            guardarDatos();
        }

        function guardarDatos() {
            localStorage.setItem('tanda_participantes', JSON.stringify(participantes));
            localStorage.setItem('tanda_monto', document.getElementById('montoAportacion').value);
            actualizarInterfaz();
        }

        function marcarPago(turno, index, checked) {
            const p = participantes.find(x => x.turno === turno);
            if (p) { p.pagos[index] = checked; guardarDatos(); }
        }

        function obtenerSemanaActual() {
            let maxSemana = 1;
            participantes.forEach(p => p.pagos.forEach((pago, index) => { if (pago) maxSemana = Math.max(maxSemana, index + 1); }));
            return maxSemana;
        }

        function actualizarInterfaz() {
            const monto = parseFloat(document.getElementById('montoAportacion').value) || 0;
            const semanaActiva = obtenerSemanaActual();
            const totalTurnos = participantes.length;
            let recaudadoTotal = 0;

            const cobraHoy = participantes.find(p => p.turno === semanaActiva);
            const infoDiv = document.getElementById('infoTurnoActivo');
            infoDiv.innerHTML = (cobraHoy && totalTurnos > 0) ? `
                <div class="turno-activo-badge">Semana Actual: ${semanaActiva}</div>
                <p style="font-size: 14px;">Cobra hoy: <b>${cobraHoy.nombre}</b></p>
                <p style="font-size: 12px; opacity: 0.8;">Monto: $${(monto * totalTurnos).toLocaleString()}</p>
            ` : '<p style="font-size: 13px; opacity: 0.7;">Sin participantes activos.</p>';

            const thead = document.getElementById('tablaHead');
            const tbody = document.getElementById('listaParticipantes');
            thead.innerHTML = `<tr><th>Turno</th><th>Participante</th>${Array.from({length: totalTurnos}, (_, i) => `<th>P${i+1}</th>`).join('')}<th>Acción</th></tr>`;
            tbody.innerHTML = '';

            participantes.forEach(p => {
                const esSuTurno = p.turno === semanaActiva;
                let filaHTML = `<td>${esSuTurno ? '⭐ ' : ''}#${p.turno}</td><td><b>${p.nombre}</b></td>`;
                for(let i=0; i<totalTurnos; i++) {
                    const pagado = p.pagos[i] || false;
                    if (pagado) recaudadoTotal += monto;
                    filaHTML += `<td><input type="checkbox" class="checkbox-pago" ${pagado ? 'checked' : ''} onchange="marcarPago(${p.turno}, ${i}, this.checked)"></td>`;
                }
                const msg = encodeURIComponent(`Hola ${p.nombre}, te recuerdo tu pago de $${monto} para la tanda.`);
                filaHTML += `<td><a href="https://wa.me/?text=${msg}" target="_blank" class="btn-action btn-wa">💬</a><button onclick="eliminarParticipante(${p.turno})" class="btn-action btn-del">✕</button></td>`;
                const fila = document.createElement('tr');
                if (esSuTurno) fila.className = 'active-row';
                fila.innerHTML = filaHTML; tbody.appendChild(fila);
            });

            document.getElementById('displayRecaudado').innerText = `$${recaudadoTotal.toLocaleString()}`;
            actualizarGraficas(recaudadoTotal, (monto * totalTurnos * totalTurnos) - recaudadoTotal);
        }

        function actualizarGraficas(p, f) {
            if (!window.Chart) return;
            const ctxDona = document.getElementById('graficaAvance').getContext('2d');
            if (graficaTotal) graficaTotal.destroy();
            graficaTotal = new Chart(ctxDona, { type: 'doughnut', data: { labels: ['Recaudado', 'Pendiente'], datasets: [{ data: [p, f <= 0 ? 0.1 : f], backgroundColor: ['#0f766e', '#dbe3ea'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } } });

            const ctxBarras = document.getElementById('graficaParticipantes').getContext('2d');
            if (graficaBarras) graficaBarras.destroy();
            graficaBarras = new Chart(ctxBarras, { type: 'bar', data: { labels: participantes.map(x => x.nombre.split(' ')[0]), datasets: [{ data: participantes.map(x => Math.round((x.pagos.filter(Boolean).length / (participantes.length || 1)) * 100)), backgroundColor: '#2563eb', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', scales: { x: { min: 0, max: 100 } }, plugins: { legend: { display: false } } } });
        }

        function descargarRespaldo() { const a = document.createElement('a'); a.href = window.URL.createObjectURL(new Blob([JSON.stringify({ participantes, monto: document.getElementById('montoAportacion').value })], { type: 'application/json' })); a.download = 'respaldo_tanda.json'; a.click(); }
        function cargarRespaldo(e) { const r = new FileReader(); r.onload = (ev) => { const d = JSON.parse(ev.target.result); participantes = d.participantes; document.getElementById('montoAportacion').value = d.monto; guardarDatos(); }; r.readAsText(e.target.files[0]); }
        function eliminarParticipante(t) { if(confirm('¿Borrar?')) { participantes = participantes.filter(p => p.turno !== t); guardarDatos(); } }
        function reiniciarTanda() { if(confirm('¿Borrar todo?')) { participantes = []; guardarDatos(); } }
        function exportarCSV() { let csv = "Turno,Nombre,Pagado\n" + participantes.map(p => `${p.turno},${p.nombre},${p.pagos.filter(x=>x).length * parseFloat(document.getElementById('montoAportacion').value)}`).join("\n"); const a = document.createElement('a'); a.href = window.URL.createObjectURL(new Blob(["\uFEFF"+csv], { type: 'text/csv' })); a.download = 'tanda.csv'; a.click(); }

        actualizarInterfaz();
    </script>
</body>
</html>
