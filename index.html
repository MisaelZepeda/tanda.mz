<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TandaBank | Flujo Semanal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --bg: #f8fafc; --surface: #ffffff; --primary: #0f766e; 
            --primary-light: #e6fffb; --accent: #2563eb; --ink: #1e293b;
            --muted: #64748b; --line: #e2e8f0; --danger: #e11d48; --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--ink); padding-bottom: 90px; }
        
        .header { background: var(--primary); color: white; padding: 25px 20px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 12px rgba(15,118,110,0.15); display: flex; justify-content: space-between; align-items: flex-start;}
        .header-content { display: flex; flex-direction: column; }
        .week-indicator { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: inline-block; margin-bottom: 8px; width: fit-content; }
        .sync-badge { background: #10b981; padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 4px;}
        .sync-badge.offline { background: var(--danger); }
        
        .container { padding: 20px 15px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        .beneficiary-card { background: linear-gradient(135deg, #0f766e, #134e4a); color: white; border: 0; }
        .payout-status { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .beneficiary-name { font-size: 28px; font-weight: 800; margin: 10px 0; }
        
        .payment-list { list-style: none; margin-top: 15px; }
        .payment-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--line); transition: 0.2s; cursor: pointer; }
        .payment-item:last-child { border-bottom: 0; }
        .payment-item.paid { background: var(--primary-light); }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--line); display: grid; place-items: center; font-weight: bold; color: var(--muted); }
        .paid .user-avatar { background: var(--primary); color: white; }

        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; display: flex; align-items: center; justify-content: center;}
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }
        .btn-success:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--line); z-index: 100; box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.05); }
        .nav-item { border: none; background: none; color: var(--muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: 500; cursor: pointer; width: 100%;}
        .nav-item.active { color: var(--primary); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-content">
            <div id="badgeSemana" class="week-indicator">Cargando...</div>
            <h1 id="tituloApp">TandaBank</h1>
        </div>
        <div id="statusNube" class="sync-badge offline">Conectando...</div>
    </div>

    <main class="container">
        <section id="tab-semana" class="tab-content active">
            <div class="card beneficiary-card">
                <p class="payout-status">Beneficiario de la semana</p>
                <h2 id="nombreBeneficiario">---</h2>
                <p id="montoTanda">$0.00 a entregar</p>
            </div>

            <div class="card">
                <h3>Checklist de Pagos</h3>
                <div id="listaPagosSemana" class="payment-list">
                    </div>
                
                <button id="btnFinalizarSemana" class="btn btn-success" disabled onclick="finalizarSemana()">
                    ✔ Entregar Tanda y Abrir Sig. Semana
                </button>
            </div>
        </section>

        <section id="tab-config" class="tab-content">
            
            <div class="card" style="border: 2px solid var(--primary);">
                <h3 style="color: var(--primary); margin-bottom: 5px;">Compartir Avance</h3>
                <p style="font-size: 12px; color: var(--muted); margin-bottom: 15px;">Pásale este enlace a tu grupo. Ellos solo podrán ver la pantalla de "Hoy" y no podrán editar los pagos.</p>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="linkPublico" readonly style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--line); font-size: 12px; background: #f1f5f9; color: var(--muted);">
                    <button onclick="copiarEnlace()" class="btn btn-primary" style="width: auto; padding: 10px 20px; font-size: 14px;">Copiar</button>
                </div>
            </div>

            <div class="card">
                <h3>Ajustes de Tanda</h3>
                <div style="margin-top: 15px;">
                    <label style="display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold;">Monto por Turno ($)</label>
                    <input type="number" id="inputMonto" value="500" onchange="actualizarMonto()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--line);">
                </div>
            </div>

            <div class="card">
                <h3>Participantes</h3>
                <form onsubmit="agregarParticipante(event)" style="display: flex; gap: 10px; margin-top: 15px;">
                    <input type="text" id="nuevoNombre" placeholder="Nombre completo" required style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--line);">
                    <button type="submit" class="btn btn-primary" style="width: auto;">Añadir</button>
                </form>
            </div>
            
            <div class="card">
                <div id="listaAdmin" class="payment-list"></div>
                <button onclick="reiniciarTanda()" class="btn" style="background: var(--danger); color: white; margin-top: 20px;">🛑 Reiniciar Toda la Tanda</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav" id="barraNavegacion">
        <button class="nav-item active" onclick="cambiarTab('semana', this)">
            <span style="font-size: 20px;">📅</span>Hoy
        </button>
        <button class="nav-item" id="navConfigBoton" onclick="cambiarTab('config', this)">
            <span style="font-size: 20px;">⚙️</span>Config
        </button>
    </nav>

    <script>
        // --- DETECCIÓN DE MODO PÚBLICO ---
        const urlParams = new URLSearchParams(window.location.search);
        const esModoPublico = urlParams.get('vista') === 'publica';

        // Si es público, ocultar controles sensibles inmediatamente
        if (esModoPublico) {
            document.getElementById('navConfigBoton').style.display = 'none';
            document.getElementById('btnFinalizarSemana').style.display = 'none';
            // Ajustar el menú inferior para que el botón de "Hoy" ocupe el centro
            document.getElementById('barraNavegacion').style.justifyContent = 'center';
        }

        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDitlSM5xe4_B-sO6wA-j8_Juvm0vpA2io",
            authDomain: "tandabank-f3565.firebaseapp.com",
            databaseURL: "https://tandabank-f3565-default-rtdb.firebaseio.com",
            projectId: "tandabank-f3565",
            storageBucket: "tandabank-f3565.firebasestorage.app",
            messagingSenderId: "685096962478",
            appId: "1:685096962478:web:791f3ace6bab3061eee03f",
            measurementId: "G-16VMBHY3K0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let appData = { semanaActual: 1, montoPorTurno: 500, participantes: [] };

        // --- SINCRONIZACIÓN ---
        db.ref('TandaLive').on('value', (snap) => {
            const val = snap.val();
            if (val) {
                appData = val;
                if (!appData.participantes) appData.participantes = [];
                if (!appData.montoPorTurno) appData.montoPorTurno = 500;
                
                document.getElementById('inputMonto').value = appData.montoPorTurno;
                renderizarTodo();
            }
            document.getElementById('statusNube').innerHTML = esModoPublico ? "🟢 Actualizado" : "🟢 En línea";
            document.getElementById('statusNube').className = "sync-badge";
        }, (error) => {
            document.getElementById('statusNube').innerHTML = "🔴 Sin conexión";
            document.getElementById('statusNube').className = "sync-badge offline";
        });

        function guardar() {
            if(!esModoPublico) db.ref('TandaLive').set(appData);
        }

        // --- LÓGICA DE INTERFAZ ---
        function copiarEnlace() {
            const campoTexto = document.getElementById('linkPublico');
            campoTexto.select();
            document.execCommand('copy');
            alert('¡Enlace copiado! Ya puedes mandarlo por WhatsApp.');
        }

        function togglePago(participanteId) {
            // Bloqueo total: Si es modo público, no hace nada al hacer clic
            if (esModoPublico) return; 

            const p = appData.participantes.find(x => x.id === participanteId);
            const sem = appData.semanaActual;
            if (!p.pagosRealizados) p.pagosRealizados = {};
            
            p.pagosRealizados[sem] = !p.pagosRealizados[sem];
            guardar();
        }

        function renderizarTodo() {
            // Generar enlace para compartir (eliminando cualquier parámetro previo)
            const urlBase = window.location.href.split('?')[0];
            document.getElementById('linkPublico').value = `${urlBase}?vista=publica`;

            const sem = appData.semanaActual;
            const beneficiario = appData.participantes.find(p => p.turno === sem) || { nombre: "¡Tanda Finalizada!" };
            const totalPozo = appData.montoPorTurno * appData.participantes.length;

            document.getElementById('badgeSemana').innerText = `SEMANA ${sem}`;
            document.getElementById('nombreBeneficiario').innerText = beneficiario.nombre;
            document.getElementById('montoTanda').innerText = (beneficiario.nombre === "¡Tanda Finalizada!" || appData.participantes.length === 0) 
                ? `Proceso completado` 
                : `$${totalPozo.toLocaleString('es-MX')} a entregar`;

            const lista = document.getElementById('listaPagosSemana');
            lista.innerHTML = '';
            
            let pagaronTodos = appData.participantes.length > 0;

            appData.participantes.forEach(p => {
                if (!p.pagosRealizados) p.pagosRealizados = {};
                const haPagado = p.pagosRealizados[sem] || false;
                if (!haPagado) pagaronTodos = false;

                const item = document.createElement('div');
                item.className = `payment-item ${haPagado ? 'paid' : ''}`;
                
                // Efectos visuales de bloqueo para participantes
                if (!esModoPublico) {
                    item.onclick = () => togglePago(p.id);
                } else {
                    item.style.cursor = 'default';
                }

                item.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">${p.nombre[0].toUpperCase()}</div>
                        <div>
                            <p style="font-weight:600">${p.nombre}</p>
                            <p style="font-size:12px; color:var(--muted)">Turno #${p.turno}</p>
                        </div>
                    </div>
                    <span style="font-size: 13px; font-weight: bold;">${haPagado ? '✅ PAGADO' : '⏳ PENDIENTE'}</span>
                `;
                lista.appendChild(item);
            });

            if (!esModoPublico) {
                document.getElementById('btnFinalizarSemana').disabled = !pagaronTodos || beneficiario.nombre === "¡Tanda Finalizada!";
                
                const listaAdmin = document.getElementById('listaAdmin');
                listaAdmin.innerHTML = appData.participantes.map(p => `
                    <div class="payment-item" style="padding: 10px 0; cursor: default;">
                        <span style="font-weight: 500;">#${p.turno} - ${p.nombre}</span>
                        <button onclick="eliminarParticipante(${p.id})" style="color:var(--danger); background:none; border:none; font-weight:bold; cursor: pointer; padding: 5px;">Borrar</button>
                    </div>
                `).join('');
            }
        }

        function finalizarSemana() {
            if (esModoPublico) return;
            const beneficiario = appData.participantes.find(p => p.turno === appData.semanaActual);
            if (confirm(`¿Confirmas que se entregó el pozo a ${beneficiario.nombre}?`)) {
                appData.semanaActual += 1;
                guardar();
                alert("¡Dinero entregado!");
            }
        }

        function agregarParticipante(e) {
            e.preventDefault();
            appData.participantes.push({ id: Date.now(), nombre: document.getElementById('nuevoNombre').value, turno: appData.participantes.length + 1, pagosRealizados: {} });
            document.getElementById('nuevoNombre').value = '';
            guardar();
        }

        function actualizarMonto() { appData.montoPorTurno = parseFloat(document.getElementById('inputMonto').value) || 0; guardar(); }
        
        function cambiarTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function eliminarParticipante(id) {
            if(confirm('¿Eliminar participante?')) {
                appData.participantes = appData.participantes.filter(p => p.id !== id);
                appData.participantes.forEach((p, index) => p.turno = index + 1);
                guardar();
            }
        }

        function reiniciarTanda() {
            if(confirm('🚨 ¡CUIDADO! Esto borrará a todos. ¿Estás seguro?')) {
                appData.semanaActual = 1; appData.participantes = []; guardar();
            }
        }
    </script>
</body>
</html>
